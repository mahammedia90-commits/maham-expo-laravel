###############################################
# Maham Expo - Production (VPS / Coolify)
# All env vars documented: Required + Optional
###############################################

services:
  # ============================================
  # Auth Service (maham-auth-expo-api)
  # ============================================
  auth-service:
    build:
      context: ./apps/maham-auth-expo-api
      dockerfile: Dockerfile.prod
      target: production
    container_name: auth-service
    restart: always
    expose:
      - "80"
    environment:
      # --- Application (Required) ---
      APP_NAME: "Maham Auth Service"
      APP_KEY: ${AUTH_APP_KEY:?AUTH_APP_KEY is required}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${AUTH_APP_URL:-https://auth-service-api.mahamexpo.sa}
      APP_LOCALE: ar
      APP_FALLBACK_LOCALE: en

      # --- Database (Required) ---
      DB_CONNECTION: mysql
      DB_HOST: auth-mysql
      DB_PORT: 3306
      DB_DATABASE: auth_service
      DB_USERNAME: ${AUTH_DB_USER:-auth_user}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}

      # --- Redis (Required) ---
      REDIS_HOST: auth-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # --- Cache ---
      CACHE_STORE: redis
      CACHE_PREFIX: auth_

      # --- Queue ---
      QUEUE_CONNECTION: redis

      # --- Session ---
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: "false"

      # --- JWT (Required) ---
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_TTL: ${JWT_TTL:-60}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-20160}
      JWT_ALGO: HS256
      JWT_BLACKLIST_ENABLED: "true"

      # --- Service Auth ---
      SERVICE_NAME: auth-service
      SERVICE_VERSION: \"1.0.0\"
      TRUSTED_SERVICE_IPS: ${TRUSTED_SERVICE_IPS:-172.0.0.0/8}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}

      # --- Logging ---
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}

      # --- Mail (Optional) ---
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@mahamexpo.sa}
      MAIL_FROM_NAME: "Maham Auth"

      # --- Hashing ---
      BCRYPT_ROUNDS: 12

      # --- Filesystem ---
      FILESYSTEM_DISK: local
    depends_on:
      auth-mysql:
        condition: service_started
      auth-redis:
        condition: service_started
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  # ============================================
  # Expo API Service
  # ============================================
  expo-api:
    build:
      context: ./apps/expo-api
      dockerfile: Dockerfile.prod
      target: production
    container_name: expo-api
    restart: always
    expose:
      - "80"
    environment:
      # --- Application (Required) ---
      APP_NAME: "Maham Expo API"
      APP_KEY: ${EXPO_APP_KEY:?EXPO_APP_KEY is required}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${EXPO_APP_URL:-https://expo-service-api.mahamexpo.sa}
      APP_LOCALE: ar
      APP_FALLBACK_LOCALE: en

      # --- Database (Required) ---
      DB_CONNECTION: mysql
      DB_HOST: expo-mysql
      DB_PORT: 3306
      DB_DATABASE: maham_expo_api
      DB_USERNAME: ${EXPO_DB_USER:-expo_user}
      DB_PASSWORD: ${EXPO_DB_PASSWORD:?EXPO_DB_PASSWORD is required}

      # --- Redis (Required) ---
      REDIS_HOST: expo-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # --- Cache ---
      CACHE_STORE: redis
      CACHE_PREFIX: expo_

      # --- Queue ---
      QUEUE_CONNECTION: redis

      # --- Session ---
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: "false"

      # --- Auth Service Connection (Required) ---
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service}
      AUTH_SERVICE_TIMEOUT: ${AUTH_SERVICE_TIMEOUT:-10}
      AUTH_SERVICE_CACHE_TTL: ${AUTH_SERVICE_CACHE_TTL:-300}

      # --- Service Identity ---
      SERVICE_NAME: expo-api
      SERVICE_VERSION: "1.0.0"
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}

      # --- Logging ---
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}

      # --- OneSignal Push Notifications (Optional) ---
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID:-}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY:-}
      ONESIGNAL_ENABLED: ${ONESIGNAL_ENABLED:-false}

      # --- Mail (Optional) ---
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@mahamexpo.sa}
      MAIL_FROM_NAME: "Maham Expo"

      # --- Hashing ---
      BCRYPT_ROUNDS: 12

      # --- Filesystem ---
      FILESYSTEM_DISK: local
    depends_on:
      expo-mysql:
        condition: service_started
      expo-redis:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 384M

  # ============================================
  # Auth MySQL
  # ============================================
  auth-mysql:
    image: mysql:8.0
    container_name: auth-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${AUTH_MYSQL_ROOT_PASSWORD:?AUTH_MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: auth_service
      MYSQL_USER: ${AUTH_DB_USER:-auth_user}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
    volumes:
      - auth-mysql-data:/var/lib/mysql
    networks:
      - maham-network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --slow-query-log=1
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 384M

  # ============================================
  # Expo MySQL
  # ============================================
  expo-mysql:
    image: mysql:8.0
    container_name: expo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${EXPO_MYSQL_ROOT_PASSWORD:?EXPO_MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: maham_expo_api
      MYSQL_USER: ${EXPO_DB_USER:-expo_user}
      MYSQL_PASSWORD: ${EXPO_DB_PASSWORD:?EXPO_DB_PASSWORD is required}
    volumes:
      - expo-mysql-data:/var/lib/mysql
    networks:
      - maham-network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --slow-query-log=1
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 384M

  # ============================================
  # Auth Redis
  # ============================================
  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - auth-redis-data:/data
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 64M

  # ============================================
  # Expo Redis
  # ============================================
  expo-redis:
    image: redis:7-alpine
    container_name: expo-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - expo-redis-data:/data
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 64M

  # ============================================
  # Dashboard (Next.js Admin Panel)
  # ============================================
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUTH_API_URL: ${AUTH_APP_URL:-https://auth-service-api.mahamexpo.sa}/api/v1
        NEXT_PUBLIC_EXPO_API_URL: ${EXPO_APP_URL:-https://expo-service-api.mahamexpo.sa}/api/v1
    container_name: dashboard
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_AUTH_API_URL: ${AUTH_APP_URL:-https://auth-service-api.mahamexpo.sa}/api/v1
      NEXT_PUBLIC_EXPO_API_URL: ${EXPO_APP_URL:-https://expo-service-api.mahamexpo.sa}/api/v1
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

networks:
  maham-network:
    external: true

volumes:
  auth-mysql-data:
  auth-redis-data:
  expo-mysql-data:
  expo-redis-data:
