###############################################
# Maham Expo - Production (VPS Direct Deploy)
# Hostinger VPS - Ubuntu 24.04 + Docker
###############################################

services:
  # ============================================
  # Nginx Reverse Proxy + SSL (Certbot)
  # ============================================
  nginx-proxy:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - auth-service
      - expo-api
    networks:
      - microservices

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done'"

  # ============================================
  # Auth Service
  # ============================================
  auth-service:
    build:
      context: ./apps/maham-auth-expo-api
      dockerfile: Dockerfile.prod
      target: production
    restart: always
    environment:
      APP_NAME: "Maham Auth Service"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${AUTH_APP_KEY:-}
      APP_URL: ${AUTH_APP_URL:-https://auth-service-api.mahamexpo.sa}
      DB_CONNECTION: mysql
      DB_HOST: auth-mysql
      DB_PORT: 3306
      DB_DATABASE: auth_service
      DB_USERNAME: ${AUTH_DB_USER:-auth_user}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: auth_
      REDIS_HOST: auth-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-}
      TRUSTED_SERVICE_IPS: ${TRUSTED_SERVICE_IPS:-172.0.0.0/8,10.0.0.0/8,192.168.0.0/16}
      LOG_CHANNEL: stack
      LOG_LEVEL: warning
    depends_on:
      - auth-mysql
      - auth-redis
    networks:
      - microservices

  # ============================================
  # Expo API Service
  # ============================================
  expo-api:
    build:
      context: ./apps/expo-api
      dockerfile: Dockerfile.prod
      target: production
    restart: always
    environment:
      APP_NAME: "Maham Expo API"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${EXPO_APP_KEY:-}
      APP_URL: ${EXPO_APP_URL:-https://expo-service-api.mahamexpo.sa}
      APP_LOCALE: ar
      DB_CONNECTION: mysql
      DB_HOST: expo-mysql
      DB_PORT: 3306
      DB_DATABASE: maham_expo_api
      DB_USERNAME: ${EXPO_DB_USER:-expo_user}
      DB_PASSWORD: ${EXPO_DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: expo_
      REDIS_HOST: expo-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AUTH_SERVICE_URL: http://auth-service
      AUTH_SERVICE_TOKEN: ${SERVICE_TOKEN:-}
      AUTH_SERVICE_TIMEOUT: 10
      AUTH_SERVICE_CACHE_TTL: 300
      RATE_LIMIT_PER_MINUTE: 60
      LOG_CHANNEL: stack
      LOG_LEVEL: warning
    depends_on:
      - expo-mysql
      - expo-redis
      - auth-service
    networks:
      - microservices

  # ============================================
  # Auth MySQL
  # ============================================
  auth-mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${AUTH_MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: auth_service
      MYSQL_USER: ${AUTH_DB_USER:-auth_user}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD:-secret}
    volumes:
      - auth-mysql-data:/var/lib/mysql
    networks:
      - microservices
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200

  # ============================================
  # Expo MySQL
  # ============================================
  expo-mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${EXPO_MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: maham_expo_api
      MYSQL_USER: ${EXPO_DB_USER:-expo_user}
      MYSQL_PASSWORD: ${EXPO_DB_PASSWORD:-secret}
    volumes:
      - expo-mysql-data:/var/lib/mysql
    networks:
      - microservices
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200

  # ============================================
  # Auth Redis
  # ============================================
  auth-redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - auth-redis-data:/data
    networks:
      - microservices

  # ============================================
  # Expo Redis
  # ============================================
  expo-redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - expo-redis-data:/data
    networks:
      - microservices

networks:
  microservices:
    driver: bridge

volumes:
  auth-mysql-data:
  auth-redis-data:
  expo-mysql-data:
  expo-redis-data:
  certbot-etc:
  certbot-var:
  certbot-webroot:
