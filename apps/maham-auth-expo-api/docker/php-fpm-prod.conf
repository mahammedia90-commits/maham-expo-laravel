; ==============================================
; PHP-FPM Production Pool Config - Auth Service
; Optimized for 2048MB container memory limit
; KVM4: 16GB RAM, 4 vCPU
; ==============================================

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Static pool = predictable memory usage (no surprises)
pm = static

; 8 workers × ~60MB = ~480MB for PHP-FPM
; With 2048M container limit, leaves room for nginx, supervisor, queue workers
pm.max_children = 8

; Recycle workers every 1000 requests to prevent memory leaks
pm.max_requests = 1000

; Process idle timeout
pm.process_idle_timeout = 10s

; Slow log for debugging
slowlog = /var/www/html/storage/logs/php-fpm-slow.log
request_slowlog_timeout = 15s

; Terminate requests that take too long
request_terminate_timeout = 120s

; Status page for monitoring
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Clear environment for security
clear_env = no

; Catch worker output
catch_workers_output = yes
decorate_workers_output = no
