[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=warn

[program:php-fpm]
command=/usr/local/sbin/php-fpm -F
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=5

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=10

; Queue worker - COMMENTED OUT for simpler deployment
; Uncomment and set QUEUE_CONNECTION=redis if you need background jobs
; [program:queue-worker]
; process_name=%(program_name)s_%(process_num)02d
; command=/bin/sh -c "sleep 30 && php /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-time=3600"
; directory=/var/www/html
; autostart=false
; autorestart=unexpected
; numprocs=1
; stdout_logfile=/var/www/html/storage/logs/queue-worker.log
