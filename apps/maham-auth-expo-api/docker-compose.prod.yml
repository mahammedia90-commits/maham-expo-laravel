# ============================================
# Docker Compose for Coolify Deployment
# ============================================
# This file is optimized for Coolify on Hostinger VPS

services:
  auth-api: 
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:80"
    environment:
      # App
      APP_NAME: "${APP_NAME:-MahamAuthAPI}"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-base64:0+WIHkXmrh9hJjbSPMaLh47S7a8Dysp32SuSgV6Hr6k=}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Riyadh}

      # Database
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-auth_service}
      DB_USERNAME: ${DB_USERNAME:-auth_user}
      DB_PASSWORD: ${DB_PASSWORD:-password123}

      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-maham_redis_2024}

      # Cache & Queue (default to database/file so app works even if Redis is down)
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}

      # JWT
      JWT_SECRET: ${JWT_SECRET:-dVefKKh4jZQm5gfGIzfKpCuUDpcwAh2i8V9L8jfhiH8giFuze6wavfVpAqIqyhFv}
      JWT_TTL: ${JWT_TTL:-60}

      # Mail (Hostinger SMTP or external)
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-MahamAuth}"

      # Service
      TRUSTED_SERVICE_IPS: ${TRUSTED_SERVICE_IPS:-}

      # Logging
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-error}
    volumes:
      - auth_storage:/var/www/html/storage
      - auth_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
        reservations:
          memory: 512M

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_DATABASE:-auth_service}
      MYSQL_USER: ${DB_USERNAME:-auth_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password123}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.75"
        reservations:
          memory: 384M
    
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-maham_redis_2024}", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    # command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"${REDIS_PASSWORD:-maham_redis_2024}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.25"
        reservations:
          memory: 128M

networks:
  maham-network:
    driver: bridge
    name: maham-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  auth_storage:
    driver: local
  auth_logs:
    driver: local
