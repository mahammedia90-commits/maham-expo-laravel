# ============================================
# NOTE: Use the root docker-compose.yml instead!
# Run from /maham-expo: docker compose up -d
# Or: make up
# ============================================
# This file is kept for standalone development only.

services:
  expo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expo-api
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - expo-network
      - microservices_network

  mysql:
    image: mysql:8.0
    container_name: expo-mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: maham_expo_api
    volumes:
      - expo-mysql-data:/var/lib/mysql
    networks:
      - expo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: expo-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    networks:
      - expo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  expo-mysql-data:

networks:
  expo-network:
    driver: bridge
  microservices_network:
    external: true
