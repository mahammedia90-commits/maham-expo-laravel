; ==============================================
; PHP-FPM Production Pool Config - Expo API
; Optimized for 512-640MB container memory limit
; ==============================================

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Static pool = predictable memory usage (no surprises)
pm = static

; 3 workers × ~60MB = ~180MB for PHP-FPM
; Leaves room for nginx, supervisor, queue workers
pm.max_children = 3

; Recycle workers every 500 requests to prevent memory leaks
pm.max_requests = 500

; Process idle timeout (not used with static, but safe default)
pm.process_idle_timeout = 10s

; Slow log for debugging
slowlog = /var/www/html/storage/logs/php-fpm-slow.log
request_slowlog_timeout = 15s

; Terminate requests that take too long (prevent zombie processes)
request_terminate_timeout = 120s

; Status page for monitoring
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Clear environment for security
clear_env = no

; Catch worker output
catch_workers_output = yes
decorate_workers_output = no
