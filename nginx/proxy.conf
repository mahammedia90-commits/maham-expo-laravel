# ============================================
# Global Performance & Security Settings
# ============================================

# Gzip Compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 4;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/vnd.api+json
    image/svg+xml
    font/woff2;

# SSL Session Caching (shared across workers)
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_status 429;

# Proxy cache for static assets
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=60m;

# ============================================
# Default Server — reject unknown hosts / IP access
# ============================================
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/auth-service-api.mahamexpo.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth-service-api.mahamexpo.sa/privkey.pem;

    return 444;
}

# ============================================
# Certbot ACME Challenge (for SSL cert generation)
# ============================================
server {
    listen 80;
    server_name auth-service-api.mahamexpo.sa expo-service-api.mahamexpo.sa;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# Auth Service - HTTPS
# ============================================
server {
    listen 443 ssl;
    server_name auth-service-api.mahamexpo.sa;

    ssl_certificate /etc/letsencrypt/live/auth-service-api.mahamexpo.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth-service-api.mahamexpo.sa/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25M;

    # Rate limit login/OTP endpoints (5 requests/min)
    location ~ ^/api/(login|otp|send-otp|verify-otp) {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://auth-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
    }

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://auth-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
    }
}

# ============================================
# Expo API - HTTPS
# ============================================
server {
    listen 443 ssl;
    server_name expo-service-api.mahamexpo.sa;

    ssl_certificate /etc/letsencrypt/live/expo-service-api.mahamexpo.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/expo-service-api.mahamexpo.sa/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25M;

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://expo-api:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
    }
}

# ============================================
# Dashboard - HTTP (Admin Panel)
# ============================================
server {
    listen 80;
    server_name dashboard.mahamexpo.sa;

    location / {
        proxy_pass http://dashboard:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Dashboard also accessible via VPS IP on port 8080 (fallback)
server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass http://dashboard:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
