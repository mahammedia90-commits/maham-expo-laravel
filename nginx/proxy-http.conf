# ============================================
# Nginx Reverse Proxy - HTTP only (for initial SSL setup)
# After getting SSL certs, this gets replaced with proxy-ssl.conf
# ============================================

# Health check endpoint
server {
    listen 80 default_server;
    server_name _;
    
    location /health-nginx {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}

# ACME challenge + proxy to services (HTTP)
server {
    listen 80;
    server_name auth-service-api.mahamexpo.sa expo-service-api.mahamexpo.sa;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth Service
    location / {
        set $backend "http://auth-service:80";
        if ($host = "expo-service-api.mahamexpo.sa") {
            set $backend "http://expo-api:80";
        }
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
