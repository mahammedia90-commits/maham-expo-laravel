name: Build & Push Docker Images

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  AUTH_IMAGE: ghcr.io/${{ github.repository }}/auth-service
  EXPO_IMAGE: ghcr.io/${{ github.repository }}/expo-api

jobs:
  build-auth:
    name: Build Auth Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/maham-auth-expo-api
          file: ./apps/maham-auth-expo-api/Dockerfile.prod
          target: production
          push: true
          tags: |
            ${{ env.AUTH_IMAGE }}:${{ github.sha }}
            ${{ env.AUTH_IMAGE }}:${{ github.ref_name }}
            ${{ env.AUTH_IMAGE }}:latest
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

  build-expo:
    name: Build Expo API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Expo API
        uses: docker/build-push-action@v5
        with:
          context: ./apps/expo-api
          file: ./apps/expo-api/Dockerfile.prod
          target: production
          push: true
          tags: |
            ${{ env.EXPO_IMAGE }}:${{ github.sha }}
            ${{ env.EXPO_IMAGE }}:${{ github.ref_name }}
            ${{ env.EXPO_IMAGE }}:latest
          cache-from: type=gha,scope=expo
          cache-to: type=gha,mode=max,scope=expo

  deploy:
    name: Trigger Coolify Deploy
    needs: [build-auth, build-expo]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Trigger Coolify Webhook
        if: env.COOLIFY_WEBHOOK != ''
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          curl -f -X POST "$COOLIFY_WEBHOOK" \
            -H "Content-Type: application/json" \
            --max-time 10 || echo "Coolify webhook not configured yet"
