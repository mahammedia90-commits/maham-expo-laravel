###############################################
# Maham Expo - Standalone Production (No Coolify/Traefik)
# Nginx reverse proxy with SSL + Docker Compose
# VPS: 16GB RAM, 4 vCPU
###############################################

services:
  # ============================================
  # Nginx Reverse Proxy (replaces Traefik)
  # ============================================
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-initial.conf:/etc/nginx/conf.d/initial.conf.bak:ro
      - letsencrypt-data:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      auth-service:
        condition: service_healthy
      expo-api:
        condition: service_healthy
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health-nginx"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ============================================
  # Certbot (SSL certificate management)
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done'"
    restart: unless-stopped
    networks:
      - maham-network

  # ============================================
  # Auth Service (maham-auth-expo-api)
  # ============================================
  auth-service:
    build:
      context: ./apps/maham-auth-expo-api
      dockerfile: Dockerfile.prod
      target: production
    container_name: auth-service
    restart: always
    expose:
      - "80"
    env_file:
      - .env.production
    environment:
      APP_NAME: "Maham Auth Service"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://auth-service-api.mahamexpo.sa
      APP_KEY: ${AUTH_APP_KEY}
      APP_LOCALE: ar
      APP_FALLBACK_LOCALE: en

      DB_CONNECTION: mysql
      DB_HOST: auth-mysql
      DB_PORT: 3306
      DB_DATABASE: auth_service
      DB_USERNAME: auth_user
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_HOST: auth-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      CACHE_STORE: redis
      CACHE_PREFIX: auth_
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: "false"

      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: 60
      JWT_REFRESH_TTL: 20160
      JWT_ALGO: HS256
      JWT_BLACKLIST_ENABLED: "true"

      SERVICE_NAME: auth-service
      SERVICE_VERSION: "1.0.0"
      TRUSTED_SERVICE_IPS: "172.0.0.0/8"
      RATE_LIMIT_PER_MINUTE: 60

      LOG_CHANNEL: stack
      LOG_LEVEL: warning

      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: noreply@mahamexpo.sa
      MAIL_FROM_NAME: "Maham Auth"

      BCRYPT_ROUNDS: 12
      FILESYSTEM_DISK: local
    depends_on:
      auth-mysql:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.5"
        reservations:
          memory: 1024M

  # ============================================
  # Expo API Service
  # ============================================
  expo-api:
    build:
      context: ./apps/expo-api
      dockerfile: Dockerfile.prod
      target: production
    container_name: expo-api
    restart: always
    expose:
      - "80"
    env_file:
      - .env.production
    environment:
      APP_NAME: "Maham Expo API"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://expo-service-api.mahamexpo.sa
      APP_KEY: ${EXPO_APP_KEY}
      APP_LOCALE: ar
      APP_FALLBACK_LOCALE: en

      DB_CONNECTION: mysql
      DB_HOST: expo-mysql
      DB_PORT: 3306
      DB_DATABASE: maham_expo_api
      DB_USERNAME: expo_user
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_HOST: expo-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      CACHE_STORE: redis
      CACHE_PREFIX: expo_
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: "false"

      AUTH_SERVICE_URL: http://auth-service
      AUTH_SERVICE_TIMEOUT: 10
      AUTH_SERVICE_CACHE_TTL: 300

      SERVICE_NAME: expo-api
      SERVICE_VERSION: "1.0.0"
      RATE_LIMIT_PER_MINUTE: 60

      LOG_CHANNEL: stack
      LOG_LEVEL: warning

      ONESIGNAL_APP_ID: ""
      ONESIGNAL_REST_API_KEY: ""
      ONESIGNAL_ENABLED: "false"

      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: noreply@mahamexpo.sa
      MAIL_FROM_NAME: "Maham Expo"

      BCRYPT_ROUNDS: 12
      FILESYSTEM_DISK: local
    depends_on:
      expo-mysql:
        condition: service_healthy
      expo-redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 3072M
          cpus: "2.0"
        reservations:
          memory: 1536M

  # ============================================
  # Auth MySQL
  # ============================================
  auth-mysql:
    image: mysql:8.0
    container_name: auth-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: auth_service
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth-mysql-data:/var/lib/mysql
    networks:
      - maham-network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=1G
      --max-connections=200
      --slow-query-log=1
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
        reservations:
          memory: 768M

  # ============================================
  # Expo MySQL
  # ============================================
  expo-mysql:
    image: mysql:8.0
    container_name: expo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: maham_expo_api
      MYSQL_USER: expo_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - expo-mysql-data:/var/lib/mysql
    networks:
      - maham-network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=1536M
      --max-connections=200
      --slow-query-log=1
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.0"
        reservations:
          memory: 1024M

  # ============================================
  # Auth Redis
  # ============================================
  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: always
    command: redis-server --maxmemory 384mb --maxmemory-policy allkeys-lru --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - auth-redis-data:/data
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ============================================
  # Expo Redis
  # ============================================
  expo-redis:
    image: redis:7-alpine
    container_name: expo-redis
    restart: always
    command: redis-server --maxmemory 384mb --maxmemory-policy allkeys-lru --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - expo-redis-data:/data
    networks:
      - maham-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

networks:
  maham-network:
    driver: bridge

volumes:
  auth-mysql-data:
    external: true
    name: q0gokws8ogws000cgk80480w_auth-mysql-data
  expo-mysql-data:
    external: true
    name: q0gokws8ogws000cgk80480w_expo-mysql-data
  auth-redis-data:
    external: true
    name: q0gokws8ogws000cgk80480w_auth-redis-data
  expo-redis-data:
    external: true
    name: q0gokws8ogws000cgk80480w_expo-redis-data
  letsencrypt-data:
  certbot-webroot:
